version: "3.8"

services:
  app_one:
    build: .
    environment:
      - INSTANCE_NAME=app_one
    networks:
      - backend_network

  app_two:
    build: .
    environment:
      - INSTANCE_NAME=app_two
    networks:
      - backend_network

  nginx:
    image: nginx:stable
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app_one
      - app_two
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge