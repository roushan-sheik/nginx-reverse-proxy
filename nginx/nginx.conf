events {}

http {
  upstream app_one_cluster {
    server app_one:5010;
  }

  upstream app_two_cluster {
    server app_two:5020;
  }

  server {
    listen 80;
    server_name localhost;

    location /app-one/ {
      proxy_pass http://app_one_cluster/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /app-two/ {
      proxy_pass http://app_two_cluster/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}